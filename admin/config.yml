backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "data/products"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "id"
    preview_path: "/"
    
    fields:
      - { label: "Product Name", name: "name", widget: "string", required: true }
      - { 
          label: "Category", 
          name: "category", 
          widget: "select", 
          required: true,
          options: [
            { label: "👨 Male", value: "male" },
            { label: "👩 Female", value: "female" },
            { label: "👤 Unisex", value: "unisex" }
          ],
          default: "male"
        }
      - { label: "Description", name: "description", widget: "text", required: true }
      - { label: "Sizes", name: "sizes", widget: "string", required: true, default: "30ml | 100ml" }
      - { label: "Price", name: "price", widget: "string", required: true, default: "R150 | R450" }
      - { label: "Icon", name: "icon", widget: "string", required: true, default: "fa-flask" }
      - { 
          label: "Badge", 
          name: "badge", 
          widget: "select", 
          required: false,
          options: [
            { label: "None", value: "" },
            { label: "⭐ Bestseller", value: "Bestseller" },
            { label: "✨ Premium", value: "Premium" },
            { label: "🆕 New", value: "New" },
            { label: "🔥 Sale", value: "Sale" }
          ],
          default: ""
        }
      - { label: "Product Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "In Stock", name: "inStock", widget: "boolean", required: false, default: true }
      - { label: "Display Order", name: "order", widget: "number", required: false, default: 0 }
      - { label: "Created At", name: "created_at", widget: "datetime", default: "", date_format: "YYYY-MM-DD", time_format: "HH:mm", picker_utc: false }
      - { label: "Updated At", name: "updated_at", widget: "datetime", default: "", date_format: "YYYY-MM-DD", time_format: "HH:mm", picker_utc: false }