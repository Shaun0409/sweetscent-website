<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweet Scent Admin</title>
    
    <!-- Decap CMS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
    
    <style>
        /* Custom admin branding */
        body {
            background: #f5f3f0;
        }
        
        /* Header branding */
        .nc-appHeader {
            background: linear-gradient(135deg, #7B8C6B, #5A6B4A) !important;
        }
        
        .nc-appHeader a {
            font-family: 'Playfair Display', serif !important;
            font-size: 1.5rem !important;
            color: white !important;
        }
        
        .nc-appHeader a::before {
            content: '🌿 ';
        }
        
        /* Gold accents */
        .nc-entryListing-item {
            border-left: 3px solid #C9A87C !important;
        }
        
        .nc-collectionPage-topBar {
            border-bottom: 2px solid #C9A87C !important;
        }
        
        /* Buttons */
        .nc-button-primary {
            background: #7B8C6B !important;
            border-color: #7B8C6B !important;
        }
        
        .nc-button-primary:hover {
            background: #5A6B4A !important;
            border-color: #5A6B4A !important;
        }
    </style>
</head>
<body>
    <!-- Decap CMS Script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // ============================================
        // DECAP CMS CONFIGURATION
        // ============================================
        
        // Register custom preview template
        CMS.registerPreviewTemplate('products', class extends React.Component {
            render() {
                const entry = this.props.entry;
                const data = entry.get('data').toJS();
                
                return React.createElement('div', {
                    style: {
                        padding: '20px',
                        fontFamily: 'Inter, sans-serif',
                        maxWidth: '400px',
                        margin: '0 auto',
                        background: 'white',
                        borderRadius: '16px',
                        boxShadow: '0 8px 30px rgba(0,0,0,0.08)',
                        textAlign: 'center'
                    }
                },
                    // Product Image Placeholder
                    React.createElement('div', {
                        style: {
                            width: '100%',
                            height: '180px',
                            background: 'linear-gradient(135deg, #E6EDE0, #f5f8f2)',
                            borderRadius: '12px',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            fontSize: '4rem',
                            color: '#C9A87C',
                            marginBottom: '15px'
                        }
                    },
                        React.createElement('i', {
                            className: `fas ${data.icon || 'fa-flask'}`
                        })
                    ),
                    // Product Name
                    React.createElement('h3', {
                        style: {
                            fontFamily: 'Playfair Display, serif',
                            fontSize: '1.3rem',
                            fontWeight: '600',
                            marginBottom: '5px',
                            color: '#1E1E1E'
                        }
                    }, data.name || 'Product Name'),
                    // Product Description
                    React.createElement('p', {
                        style: {
                            fontSize: '0.9rem',
                            color: '#777',
                            marginBottom: '12px'
                        }
                    }, data.description || 'Product description'),
                    // Product Details
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            justifyContent: 'space-between',
                            marginBottom: '15px',
                            padding: '0 5px'
                        }
                    },
                        React.createElement('span', {
                            style: { color: '#666', fontSize: '0.9rem' }
                        }, `🧴 ${data.sizes || '30ml | 100ml'}`),
                        React.createElement('span', {
                            style: {
                                fontWeight: '700',
                                color: '#5A6B4A',
                                fontSize: '1.2rem'
                            }
                        }, data.price || 'R150 | R450')
                    ),
                    // Order Button
                    React.createElement('div', {
                        style: {
                            background: '#25D366',
                            color: 'white',
                            padding: '10px',
                            borderRadius: '50px',
                            textAlign: 'center',
                            fontWeight: '600',
                            fontSize: '0.9rem'
                        }
                    },
                        '💬 Order via WhatsApp'
                    )
                );
            }
        });
        
        // Initialize CMS
        CMS.init({
            config: {
                // Backend configuration
                backend: {
                    name: 'git-gateway',
                    branch: 'main',
                    commit_messages: {
                        create: '✨ Add {{collection}} "{{slug}}"',
                        update: '📝 Update {{collection}} "{{slug}}"',
                        delete: '🗑️ Delete {{collection}} "{{slug}}"',
                        uploadMedia: '📸 Upload "{{path}}"',
                        deleteMedia: '🗑️ Delete "{{path}}"'
                    }
                },
                
                // Media settings
                media_folder: 'images/products',
                public_folder: '/images/products',
                
                // Collections
                collections: [
                    {
                        name: 'products',
                        label: 'Products',
                        label_singular: 'Product',
                        folder: 'data/products',
                        create: true,
                        delete: true,
                        slug: '{{slug}}',
                        identifier_field: 'id',
                        preview_path: '/',
                        
                        // Filter options
                        view_filters: [
                            { label: 'All Products', field: 'category', pattern: '.*' },
                            { label: '👨 Male', field: 'category', pattern: '^male$' },
                            { label: '👩 Female', field: 'category', pattern: '^female$' },
                            { label: '👤 Unisex', field: 'category', pattern: '^unisex$' }
                        ],
                        
                        // Group by category
                        view_groups: [
                            { label: 'Category', field: 'category' }
                        ],
                        
                        // Sort options
                        sortable_fields: ['name', 'price', 'category', 'created_at'],
                        
                        // Fields
                        fields: [
                            {
                                label: 'Product ID',
                                name: 'id',
                                widget: 'number',
                                default: 1,
                                value_type: 'int',
                                min: 1
                            },
                            {
                                label: 'Product Name',
                                name: 'name',
                                widget: 'string',
                                required: true,
                                hint: 'e.g., Most Wanted'
                            },
                            {
                                label: 'Category',
                                name: 'category',
                                widget: 'select',
                                required: true,
                                options: [
                                    { label: '👨 Male', value: 'male' },
                                    { label: '👩 Female', value: 'female' },
                                    { label: '👤 Unisex', value: 'unisex' }
                                ],
                                default: 'male'
                            },
                            {
                                label: 'Description',
                                name: 'description',
                                widget: 'text',
                                required: true,
                                hint: 'Short product description (e.g., Bold and charismatic)'
                            },
                            {
                                label: 'Sizes Available',
                                name: 'sizes',
                                widget: 'string',
                                required: true,
                                default: '30ml | 100ml',
                                hint: 'e.g., 30ml | 100ml or 30ml'
                            },
                            {
                                label: 'Price',
                                name: 'price',
                                widget: 'string',
                                required: true,
                                default: 'R150 | R450',
                                hint: 'e.g., R150 | R450 or R180'
                            },
                            {
                                label: 'Icon',
                                name: 'icon',
                                widget: 'string',
                                required: true,
                                default: 'fa-flask',
                                hint: 'FontAwesome icon class (e.g., fa-crown, fa-flower)',
                                pattern: ['^fa-', 'Must start with fa-']
                            },
                            {
                                label: 'Badge / Tag',
                                name: 'badge',
                                widget: 'select',
                                required: false,
                                options: [
                                    { label: 'None', value: '' },
                                    { label: '⭐ Bestseller', value: 'Bestseller' },
                                    { label: '✨ Premium', value: 'Premium' },
                                    { label: '🆕 New', value: 'New' },
                                    { label: '🔥 Sale', value: 'Sale' },
                                    { label: '🌟 Limited Edition', value: 'Limited Edition' }
                                ],
                                default: ''
                            },
                            {
                                label: 'Product Image',
                                name: 'image',
                                widget: 'image',
                                required: false,
                                hint: 'Upload a product image (optional)',
                                media_library: {
                                    config: {
                                        multiple: false,
                                        accept: 'image/*'
                                    }
                                }
                            },
                            {
                                label: 'Featured Product',
                                name: 'featured',
                                widget: 'boolean',
                                required: false,
                                default: false,
                                hint: 'Check to feature this product on the homepage'
                            },
                            {
                                label: 'In Stock',
                                name: 'inStock',
                                widget: 'boolean',
                                required: false,
                                default: true
                            },
                            {
                                label: 'Display Order',
                                name: 'order',
                                widget: 'number',
                                required: false,
                                hint: 'Lower numbers show first',
                                min: 0,
                                default: 0
                            },
                            {
                                label: 'SEO Title',
                                name: 'seo_title',
                                widget: 'string',
                                required: false,
                                hint: 'Custom title for SEO (optional)'
                            },
                            {
                                label: 'SEO Description',
                                name: 'seo_description',
                                widget: 'text',
                                required: false,
                                hint: 'Custom description for SEO (optional)'
                            },
                            {
                                label: 'Created At',
                                name: 'created_at',
                                widget: 'datetime',
                                default: '',
                                date_format: 'YYYY-MM-DD',
                                time_format: 'HH:mm',
                                picker_utc: false
                            },
                            {
                                label: 'Updated At',
                                name: 'updated_at',
                                widget: 'datetime',
                                default: '',
                                date_format: 'YYYY-MM-DD',
                                time_format: 'HH:mm',
                                picker_utc: false
                            }
                        ]
                    }
                ],
                
                // Site URL for preview
                site_url: 'https://sweet-scent00.netlify.app',
                
                // Display settings
                display_url: 'https://sweet-scent00.netlify.app',
                
                // Logo
                logo_url: 'https://sweet-scent00.netlify.app/favicon.ico',
                
                // Local backend (for testing)
                local_backend: {
                    url: 'http://localhost:8080/api',
                    allowed_hosts: ['localhost']
                }
            }
        });
        
        console.log('🌿 Sweet Scent Admin · Ready');
        console.log('📝 Manage your products here');
    </script>
</body>
</html>
